# release_build.yaml
name: Next JS Build

# Controls when the workflow will run
on:
  workflow_call:
    inputs:
      FLAVOUR:
        required: true
        type: string
        default: "production"
      runs_on:
        required: false
        type: string
        default: "ubuntu-latest"
      folder_max_mb_size:
        required: false
        type: number
        default: 3
      secrets_map:
        required: false
        type: string
        default: ""
      set_as_env:
        required: false
        type: string
        default: ""

      working_directory:
        required: false
        type: string
        default: "."

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  build:
    runs-on: ${{inputs.runs_on}} # We are using ubuntu to deploy flutter web
    timeout-minutes: 20
    environment: ${{inputs.FLAVOUR}}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Set Up Node.js
        uses: actions/setup-node@main
        with:
          node-version: ${{ vars.NODE_FRAMEWORK_VERSION }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          # See here for caching with `yarn`, `bun` or other package managers https://github.com/actions/cache/blob/main/examples.md or you can leverage caching with actions/setup-node https://github.com/actions/setup-node
          path: |
            ~/.npm
            ${{ inputs.working_directory }}/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}-${{ hashFiles(format('{0}/**/*.js', inputs.working_directory), format('{0}/**/*.jsx', inputs.working_directory), format('{0}/**/*.ts', inputs.working_directory), format('{0}/**/*.tsx', inputs.working_directory)) }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}-

      - name: 📦 Install Dependencies
        # npm ci instead of npm install to not overwrite package_lock.json
        run: npm install

      - name: Set env
        id: prepare_env # An ID is required to reference its output
        env:
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
          CLOUDFLARE_API_TOKEN: ${{secrets.CLOUDFLARE_API_TOKEN}}
          CLOUDFLARE_ACCOUNT_ID: ${{secrets.CLOUDFLARE_ACCOUNT_ID}}
        run: |
          echo "NEXT_PUBLIC_FLAVOUR=${{ inputs.FLAVOUR }}" >> $GITHUB_ENV
          if [[ "${{inputs.FLAVOUR}}" != "production" ]]; then
            echo "NEXTJS_ENV=${{ inputs.FLAVOUR }}" >> $GITHUB_ENV
          fi

          mapfile -t EXCLUDE_LIST <<< "${{ inputs.set_as_env }}"

          is_excluded() {
            local var="$1"
            for item in "${EXCLUDE_LIST[@]}"; do
              [[ "$item" == "$var" ]] && return 0
            done
            return 1
          }

          while IFS=':' read -r env_var secret_name; do
            env_var=$(echo "$env_var" | xargs)
            secret_name=$(echo "$secret_name" | xargs)

            if [[ -n "$secret_name" && -n "$env_var" ]]; then
              secret_value=$(echo "$SECRETS_CONTEXT" | jq -r --arg key "$secret_name" '.[$key]')

              if [[ "$secret_value" != "null" && -n "$secret_value" ]]; then
                # If it's a NEXT_PUBLIC_ variable → add to env (public)
                if [[ "$env_var" == NEXT_PUBLIC_* ]]; then
                  echo "$env_var=$secret_value" >> "$GITHUB_ENV"
                  echo "✅ Added public var: $env_var"
                elif is_excluded "$env_var"; then
                  echo "$env_var=$secret_value" >> "$GITHUB_ENV"
                  echo "⚙️  Added excluded var as env: $env_var"
                else
                  echo "✅ Added secret: $env_var"
                  if ! output=$(echo "$secret_value" | npx wrangler secret put "$env_var" ${{ inputs.FLAVOUR != 'production' && format('--env {0}', inputs.FLAVOUR) || '' }} 2>&1); then
                    if [[ "$output" == *"already in use"* ]]; then
                      echo "⚠️  Variable $env_var is already defined as a non-secret variable. Skipping secret creation."
                    else
                      echo "$output"
                      exit 1
                    fi
                  else
                    echo "$output"
                  fi
                fi
              fi
            fi
          done <<< "${{ inputs.secrets_map }}" # <-- The key change is here
        shell: bash

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{secrets.CLOUDFLARE_API_TOKEN}}
          accountId: ${{secrets.CLOUDFLARE_ACCOUNT_ID}}
          workingDirectory: ${{ inputs.working_directory }}
          command: deploy
          packageManager: npm
          environment: ${{ inputs.FLAVOUR != 'production' && inputs.FLAVOUR || '' }}
          preCommands: npm run pre-deploy && chmod +x ./check_app_size.sh && ./check_app_size.sh
  notify:
    if: always() # Ensures this job runs regardless of the completion status of dependent jobs
    needs:
      - build
    uses: ./.github/workflows/notification.yml
    secrets: inherit
    with:
      job_status: ${{ needs.build.result }}
      workflow: ${{ github.workflow }}
      runs_on: ${{inputs.runs_on}}
      trigger_actor: ${{ github.actor }}
      pr_title: ${{ github.event.pull_request.title }}
